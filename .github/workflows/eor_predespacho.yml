name: EOR Scraper - Predespacho SV

on:
  schedule:
    # 2:29 PM hora El Salvador (CST = UTC-6) => 20:29 UTC
    - cron: '29 20 * * *'
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EOR scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          DEST_EMAIL: ${{ secrets.DEST_EMAIL }}
        run: python eor_scraper.py --watch --email
